<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>宅宅の家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>歡迎來到我的網站</h1>
    <a href="https://discord.gg/kJM9V8hC4u" class="join-btn">宅宅の家DC社群</a>
    <h1>這是一個Discord群之網站，提供給喜歡玩遊戲的人。
    
    <script src="script.js"></script>

    <div class="dc-card">
    <img src="your-server-logo.png" alt="Server Logo">
    <h2>頂級玩家社群</h2>
    <p>目前在線人數：<span id="online-count">讀取中...</span></p>
    
    <script>
    // 1. 在這裡貼上你剛剛複製的 ID
    const serverID = "1391071869578248332"; 

    async function fetchDiscordStatus() {
        try {
            // 2. 透過 Discord 官方 API 抓取資料
            const response = await fetch(`https://discord.com/api/guilds/${1391071869578248332}/widget.json`);
            if (!response.ok) throw new Error('無法取得資料');
            
            const data = await response.json();
            
            // 3. 找到你的 HTML 裡顯示人數的地方 (假設 ID 是 online-count)
            const countElement = document.getElementById('1391071869578248332');
            if (countElement) {
                countElement.innerText = data.presence_count;
            }
        } catch (error) {
            console.error("抓取失敗:", error);
        }
    }

    // 初次執行
    fetchDiscordStatus();
    // 每分鐘自動更新一次
    setInterval(fetchDiscordStatus, 60000);
</script>
    
</div>

</body>
</html>
