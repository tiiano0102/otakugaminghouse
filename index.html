<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>宅宅の家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>歡迎來到我的網站</h1>
    <a href="https://discord.gg/kJM9V8hC4u" class="join-btn">宅宅の家DC社群</a>
    <h1>這是一個Discord群之網站，提供給喜歡玩遊戲的人。
    
    <script src="script.js"></script>

    <div class="dc-card">
    <img src="your-server-logo.png" alt="Server Logo">
    <h2>頂級玩家社群</h2>
    <p>目前在線人數：<span id="online-count">讀取中...</span></p>
    
        <script>
    // 使用你的邀請碼末端（例如：kJM9V8hc4u）
    const inviteCode = "kJM9V8hC4u"; 

    async function getOnlineCount() {
        try {
            // 透過邀請碼 API 抓取伺服器即時狀態
            const response = await fetch(`https://discord.com/api/v9/invites/${inviteCode}?with_counts=true`);
            const data = await response.json();
            
            // approximate_presence_count 就是在線人數
            const online = data.approximate_presence_count;
            const total = data.approximate_member_count;

            document.getElementById('online-count').innerText = `${online} 人在線 (總共 ${total} 人)`;
        } catch (error) {
            console.error("抓取失敗", error);
            document.getElementById('online-count').innerText = "暫時無法讀取";
        }
    }

    getOnlineCount();
    setInterval(getOnlineCount, 30000); // 每 30 秒更新一次
</script>



    
</div>

</body>
</html>
