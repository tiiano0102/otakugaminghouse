<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>宅宅の家</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <a href="index.html">
            <img src="image/1.jpg" alt="宅宅の家" height="150" width="150">
        </a> 

    <div class="nav-container">
        <div class="logo"><a href="index.html" class="" onclick="showPage('home')"></a>
 
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item" onclick="showPage('home')">首頁</a></li>
            <li><a href="law.html" class="nav-item" onclick="showPage('main')">規則</a></li>
            <li><a href="main-member.html" class="nav-item" onclick="showPage('main')">主要成員</a></li>
            <li><a href="" class="nav-item" onclick="showPage('discord')">社群狀態</a></li>
        </ul>
    </div>
</nav>

<main class="content-wrapper">
    <section id="home" class="page-content active">
        <div class="hero-banner">
            <h1><strong>歡迎來到宅宅の家</strong></h1><h2><strong>這是一個Discord群之網站，提供給喜歡玩遊戲的人。</strong></h2>
        </div>
        <div class="info-card">
            <h3><strong>關於我們</strong></h3>
            <p>這是一個提供給喜歡玩遊戲的人的Discord社群網站。</p>
        </div>
    </section>

    <section id="main" class="page-content">
        <h2>主要成員</h2>
        <ul class="news-list">
            <li><span>2024/03/27</span> 伺服器規則更新</li>
            <li><span>2024/03/20</span> 本週遊戲活動：英雄聯盟大賽</li>
        </ul>
    </section>

    <section id="home" class="home">
        <h2>Discord 社群狀態</h2>
        <div class="dc-card">
            <p>目前在線人數：<span id="online-count">讀取中...</span></p>
            <a href="https://discord.gg/kJM9V8hc4u" class="join-btn">點我加入 DC</a>
        </div>
    </section>
</main>

<script>
    // 使用你的邀請碼末端（例如：kJM9V8hc4u）
    const inviteCode = "kJM9V8hc4u"; 

    async function getOnlineCount() {
        try {
            // 透過邀請碼 API 抓取伺服器即時狀態
            const response = await fetch(`https://discord.com/api/v9/invites/${inviteCode}?with_counts=true`);
            const data = await response.json();
            
            // approximate_presence_count 就是在線人數
            const online = data.approximate_presence_count;
            const total = data.approximate_member_count;

            document.getElementById('online-count').innerText = `在線${online} 人（總共 ${total} 人）`;
        } catch (error) {
            console.error("抓取失敗", error);
            document.getElementById('online-count').innerText = "暫時無法讀取";
        }
    }

    getOnlineCount();
    setInterval(getOnlineCount, 30000); // 每 30 秒更新一次
</script>

<script src="index.js"></script>

</body>
</html>
